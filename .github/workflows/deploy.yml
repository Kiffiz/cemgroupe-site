name: 🚀 Déploiement Site CEMGROUPE → VPS

on:
  push:
    branches: [main]
  workflow_dispatch:   # déclenchement manuel depuis GitHub

jobs:
  deploy:
    name: Deploy Site Vitrine
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Clé SSH ──────────────────────────────────────────────────────────
      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          echo "" >> ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── 2. Déploiement par git dans /var/www/cemgroupe-site (servi par nginx) ─
      # nginx sert le site EN STATIQUE depuis /var/www/cemgroupe-site (pas /opt, pas PM2).
      # On synchronise par git. `set -e` + pas de `|| true` : le job ÉCHOUE si ça casse.
      - name: 📤 Déploiement (git → /var/www/cemgroupe-site)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -e; \
             REPO=/var/www/cemgroupe-site; \
             sudo git config --global --add safe.directory \$REPO; \
             cd \$REPO; \
             sudo git fetch origin main; \
             sudo git reset --hard origin/main; \
             sudo chown -R www-data:www-data \$REPO; \
             echo \"Déployé sur le commit : \$(sudo git rev-parse --short HEAD)\""

      # ── 3. Healthcheck : le job échoue si le site HTTPS ne renvoie pas 200 ───
      # On teste en HTTPS (le HTTP renvoie 301 vers HTTPS depuis l'ajout du certificat).
      - name: ✅ Vérification (HTTPS 200 obligatoire)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "code=\$(curl -sk -o /dev/null -w '%{http_code}' --resolve cemgroupe.com:443:127.0.0.1 https://cemgroupe.com/); \
             echo \"Site vitrine (HTTPS) : \$code\"; \
             [ \"\$code\" = '200' ] || { echo 'ÉCHEC : le site ne répond pas 200'; exit 1; }"
